<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Up Genshin Impact</title>
  <link rel="stylesheet" href="scss/style.css">
  <link rel="stylesheet" href="scss/order.css">
</head>
<body class="order-page">

  <header class="main-header">
    <div class="logo">TOPUP<span>GAME</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="#">Cek Pesanan</a>
    </nav>
  </header>

  <div class="order-wrapper">
    <div class="order-left">
      <div class="game-info">
        <img src="images/genshin.png" class="game-logo" alt="Genshin Impact">
        <h2>Genshin Impact</h2>
        <p class="publisher">HoYoverse</p>
        <ul class="desc">
          <li>⚡ Proses Instan</li>
          <li>🕒 Buka 24 Jam</li>
          <li>✅ Aman & Terpercaya</li>
          <li>💎 Genesis Crystal Langsung Masuk</li>
        </ul>
      </div>
    </div>

    <div class="order-right">
      <div class="card">
        <h3><span>1</span> Masukkan User ID</h3>
        <input type="text" id="userId" placeholder="Masukkan UID Genshin Impact kamu">
      </div>
      <div class="card">
        <h3><span>2</span> Pilih Paket Genesis Crystal</h3>
        <div class="nominal-list" id="nominalList"></div>
      </div>
      <button id="orderBtn">Beli Sekarang</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/gensin.js"></script>
</body>
</html>
