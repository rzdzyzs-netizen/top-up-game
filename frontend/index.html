<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Up Game</title>
  <link rel="stylesheet" href="scss/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">EL<span>Game Shop</span></div>
    <div class="navbar-right">
      <button class="btn-primary">Semua Game</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Top Up Game <span>Cepat</span> & Aman</h1>
    <p>Mobile Legends · Free Fire · PUBG Mobile · dan banyak lagi</p>
    <div class="hero-badges">
      <div class="badge"><span class="dot"></span> Proses Instan</div>
      <div class="badge"><span class="dot"></span> Buka 24 Jam</div>
      <div class="badge"><span class="dot"></span> Harga Terjangkau</div>
      <div class="badge"><span class="dot"></span> 100% Aman</div>
    </div>
  </section>

  <!-- SECTION TITLE -->
  <div class="section-header">
    <h2>Pilih Game</h2>
  </div>

  <!-- GAME LIST — diisi otomatis oleh main.js -->
  <section class="games" id="gameList"></section>

  <!-- FOOTER -->
  <footer class="footer-strip">
    <p>© 2025 <span>TopUpGame</span> — All rights reserved</p>
    <p>Made with <span>♥</span> for gamers</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
